services:
  app:
    container_name: vkr_russkin
    hostname: vkr_russkin
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "0.0.0.0:5454:5454"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5454
      DatabaseProvider: MariaDb
      ConnectionStrings__DefaultConnection: "Server=db;Port=3306;Database=vkr_russkin;User=vkr_russkin;Password=vkr_russkin_password;CharSet=utf8mb4;"
      DatabaseSeed__SqlitePath: "/app/seed/TeploenergetikaKursovaya.db"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: mariadb:11.4
    container_name: vkr_russkin_mariadb
    hostname: vkr_russkin_mariadb
    environment:
      MARIADB_DATABASE: vkr_russkin
      MARIADB_USER: vkr_russkin
      MARIADB_PASSWORD: vkr_russkin_password
      MARIADB_ROOT_PASSWORD: vkr_russkin_root_password
      MARIADB_ROOT_HOST: "%"
    ports:
      - "127.0.0.1:5456:3306"
    volumes:
      - vkr-russkin-mariadb-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h localhost -u$${MARIADB_USER} -p$${MARIADB_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  vkr-russkin-mariadb-data:
